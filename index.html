<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>OMNI-CAT SUPREME V18</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --neon: #00f2fe; --vibe: #8f00ff; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-frame { width: 95%; max-width: 600px; height: 95vh; display: flex; flex-direction: column; background: #080808; border-radius: 30px; border: 1px solid #222; margin-top: 10px; }
        
        #display-area { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .bubble { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .cat-msg { background: rgba(0, 242, 254, 0.05); padding: 15px; border-radius: 0 20px 20px 20px; border-left: 4px solid var(--neon); }
        .user-tag { font-size: 10px; color: #555; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* පාලක පද්ධතිය (Controls) */
        .input-zone { padding: 20px; background: #050505; border-top: 1px solid #111; display: flex; align-items: center; gap: 10px; }
        .mic-btn { background: #ff3b3b; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; }
        .mic-btn.active { background: white; box-shadow: 0 0 20px white; }
        
        input { flex: 1; background: #111; border: 1px solid #333; border-radius: 25px; color: white; padding: 15px 20px; outline: none; font-size: 16px; }
        input:focus { border-color: var(--neon); }
        
        .send-btn { background: var(--neon); color: black; border: none; padding: 12px 25px; border-radius: 25px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { transform: scale(1.05); background: white; }
    </style>
</head>
<body>

<div class="app-frame">
    <div id="display-area">
        <div class="bubble">
            <span class="user-tag" style="color: var(--neon);">OMNI-CAT</span>
            <div class="cat-msg">"බය වෙන්න එපා මචං, මම දැන් සිස්ටම් එක හැදුවා! මට දැන් ඕනෑම දෙයක් ටයිප් කරලා එවන්න. මම බලන් ඉන්නේ."</div>
        </div>
    </div>

    <div class="input-zone">
        <button class="mic-btn" id="mic-trigger" onclick="startVoice()">🎤</button>
        <input type="text" id="main-input" placeholder="මෙතන ටයිප් කරන්න..." onkeypress="if(event.key === 'Enter') dispatch_event()">
        <button class="send-btn" id="fly-trigger" py-click="brain_logic">FLY</button>
    </div>
</div>

<script type="py">
from pyscript import document
import datetime
import random

history = []

async def brain_logic(event):
    input_field = document.querySelector("#main-input")
    msg = input_field.value.strip()
    if not msg: return

    render_chat("YOU", msg)
    input_field.value = ""

    # --- THE BRAIN ---
    low_msg = msg.lower()
    
    if "උෂ්ණත්වය" in low_msg:
        temp = random.randint(30, 33)
        res = f"මම පද්ධතිය පීරලා බැලුවා මචං. කළුතර උෂ්ණත්වය දැන් සෙල්සියස් {temp}°C විතර ඇති."
    elif "මතකද" in low_msg:
        res = f"අනිවාර්යයෙන්ම මචං! අපි මේ වෙනකන් දේවල් {len(history) + 1}ක් ගැන කතා කරලා තියෙනවා."
    elif "ඔයාට කොහොමද" in low_msg:
        res = "මම පට්ට ගැම්මෙන් ඉන්නවා මචං! ඔයා අද මොනවද කරන්නේ?"
    else:
        res = "ඒක හරිම ගැඹුරු ප්‍රශ්නයක් මචං. මම ඒ ගැන තව ගැඹුරට හිතනවා."

    history.append(msg)
    render_chat("OMNI-CAT", res)

def render_chat(user, text):
    area = document.querySelector("#display-area")
    div = document.createElement("div")
    div.className = "bubble"
    color = "#00f2fe" if user == "OMNI-CAT" else "#555"
    div.innerHTML = f'<span class="user-tag" style="color:{color}">{user}</span><div class="cat-msg">{text}</div>'
    area.appendChild(div)
    area.scrollTop = area.scrollHeight
</script>

<script>
    // JS helpers for UI
    function dispatch_event() {
        document.getElementById("fly-trigger").click();
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'si-LK';
    
    recognition.onstart = () => document.getElementById('mic-trigger').classList.add('active');
    recognition.onend = () => document.getElementById('mic-trigger').classList.remove('active');
    
    recognition.onresult = (event) => {
        document.getElementById('main-input').value = event.results[0][0].transcript;
        dispatch_event();
    };

    function startVoice() { recognition.start(); }
</script>

</body>
</html>
