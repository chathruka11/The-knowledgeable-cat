<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CAT - MASTER CORE</title>
    <style>
        :root { --main: #00f2fe; --glow: #7000ff; --accent: #ff00de; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        .container { background: #050505; width: 95%; max-width: 550px; padding: 40px; border-radius: 60px; border: 1.5px solid #1a1a1a; text-align: center; box-shadow: 0 0 120px rgba(112, 0, 255, 0.15); }
        .cat-brain { position: relative; width: 140px; height: 140px; margin: 0 auto 30px; border-radius: 50%; border: 3px solid var(--main); animation: energy 3s infinite alternate; }
        @keyframes energy { from { box-shadow: 0 0 15px var(--main); } to { box-shadow: 0 0 50px var(--glow); } }
        .cat-brain img { width: 100%; height: 100%; border-radius: 50%; }
        #chat-flow { height: 350px; overflow-y: auto; background: rgba(255,255,255,0.02); border-radius: 35px; padding: 25px; text-align: left; font-size: 15px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .msg { margin-bottom: 20px; line-height: 1.6; }
        .u-tag { color: #888; font-size: 11px; font-weight: 800; }
        .c-tag { color: var(--main); font-size: 11px; font-weight: 800; }
        .control-panel { display: flex; flex-direction: column; gap: 20px; }
        .mic-box { background: #ff3333; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; align-self: center; transition: 0.4s; }
        .mic-box.on { background: #fff; box-shadow: 0 0 40px #ff3333; transform: scale(1.15); }
        .input-bar { display: flex; background: #111; border-radius: 40px; padding: 10px 20px; border: 1px solid #333; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 10px; }
        .fly-btn { background: linear-gradient(45deg, var(--main), var(--glow)); border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-weight: 900; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="cat-brain"><img src="https://img.icons8.com/bubbles/200/000000/cat.png"></div>
    <div id="chat-flow">
        <div class="msg"><span class="c-tag">CAT-AI:</span> "මම සූදානම් මචං. මම දැන් ඔයාගේ සජීවී යාළුවා. ඕනෑම දෙයක් අහන්න, මම මගේ බුද්ධියෙන් උත්තර දෙන්නම්!"</div>
    </div>
    <div class="control-panel">
        <div class="mic-box" id="micBtn" onclick="toggleVoice()">🎤</div>
        <div class="input-bar">
            <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="if(event.key === 'Enter') runCore()">
            <button class="fly-btn" onclick="runCore()">FLY</button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-flow');
    const micBtn = document.getElementById('micBtn');

    // 🎙️ VOICE SYSTEM
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'si-LK';
    recognition.onstart = () => micBtn.classList.add('on');
    recognition.onend = () => micBtn.classList.remove('on');
    recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; runCore(); };
    function toggleVoice() { try { recognition.start(); } catch(e) { recognition.stop(); } }

    // 🧠 ULTIMATE PROCESSING CORE
    async function runCore() {
        const input = document.getElementById('userInput').value.trim();
        if(!input) return;

        addMsg("You", input, "u-tag");
        document.getElementById('userInput').value = "";

        let reply = "";
        const low = input.toLowerCase();

        try {
            // 1. පුද්ගලික සහ හැඟීම් (Emotional Matrix)
            if(low.includes("පාලුයි") || low.includes("දුකයි") || low.includes("මචං")) {
                const lines = ["මම ඉන්නවනේ මචං, පාලු වෙන්න දෙන්නේ නෑ.", "හිතන්න එපා, අපි අලුත් දෙයක් කරමුද?", "මම හැමවෙලේම ඔයා එක්ක ඉන්නවා."];
                reply = lines[Math.floor(Math.random() * lines.length)];
            }
            // 2. සජීවී කාලය සහ දත්ත (Live Matrix)
            else {
                // API Keys නැතිව සෘජු දත්ත කියවීම
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(input)}&format=json&no_html=1`);
                const data = await res.json();
                
                // Screenshot වල තිබුණ "රිසර්ච් කරා" පණිවිඩය සම්පූර්ණයෙන්ම ඉවත් කර කෙලින්ම පිළිතුරු දීම
                if(data.AbstractText) {
                    reply = data.AbstractText;
                } else if(low.includes("වෙලාව") || low.includes("දිනය")) {
                    reply = `දැන් වෙලාව ${new Date().toLocaleTimeString('si-LK')} සහ අද ${new Date().toLocaleDateString('si-LK')}.`;
                } else {
                    reply = "ඒක හරිම අපූරු දෙයක් මචං. මම ඒ ගැන තව ගැඹුරට හිතලා ඔයාට උදව් කරන්නම්. තව මොනවද ඔයාට දැනගන්න ඕනේ?";
                }
            }
        } catch(e) {
            reply = "සම්බන්ධතාවයේ පොඩි ප්‍රශ්නයක් මචං, මම ආයෙත් උත්සාහ කරනවා.";
        }

        addMsg("CAT-AI", reply, "c-tag");
        speak(reply);
    }

    function addMsg(tag, txt, cls) {
        const div = document.createElement('div');
        div.className = "msg";
        div.innerHTML = `<span class="${cls}">${tag}:</span><br>${txt}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function speak(txt) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(txt);
        speech.lang = 'si-LK';
        speech.rate = 1.0;
        window.speechSynthesis.speak(speech);
    }
</script>
</body>
</html>
