<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART AI CAT - Pro</title>
    <style>
        body { background: #121212; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; }
        .container { background: #1e1e1e; width: 90%; max-width: 400px; padding: 30px; border-radius: 40px; border: 2px solid #00f2fe; text-align: center; box-shadow: 0 0 20px #00f2fe; }
        /* පින්තූරේ ලස්සනට පේන්න මෙතන වෙනස් කළා */
        .cat-box img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00f2fe; background: #000; object-fit: contain; }
        #status { margin: 20px 0; font-size: 16px; min-height: 80px; color: #00f2fe; line-height: 1.4; }
        input { width: 85%; padding: 15px; border-radius: 20px; border: none; margin-bottom: 10px; background: #333; color: white; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 16px; }
        .btn-ask { background: #00f2fe; color: #000; }
        .btn-voice { background: #ff758c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #00f2fe; letter-spacing: 2px;">SMART AI CAT 🐾</h2>
    <div class="cat-box">
        <img src="https://img.icons8.com/bubbles/200/000000/cat.png" alt="Smart Cat">
    </div>
    <div id="status">Hello Boss Chathruka! I'm ready to chat.</div>
    <input type="text" id="userInput" placeholder="I'm bored..." onkeypress="if(event.key === 'Enter') askCat()">
    <button class="btn-ask" onclick="askCat()">ප්‍රසංගෙන් අහන්න</button>
    <button class="btn-voice" onclick="startVoice()">🎤 Voice Live</button>
</div>

<script>
    async function askCat() {
        const input = document.getElementById('userInput').value.trim();
        const status = document.getElementById('status');
        if(!input) return;

        status.innerText = "Thinking... 🐈";
        let lowInput = input.toLowerCase();
        let response = "";

        // 🧠 Friendly AI Brain - අපි පූසාව පණ ගන්වමු
        if(lowInput.includes("bored")) {
            response = "Oh no! If you're bored, let's talk about something fun! Do you want me to tell you a cat joke or some space facts?";
        } 
        else if(lowInput.includes("time")) {
            response = "The time is " + new Date().toLocaleTimeString() + ", Boss! Make every second count.";
        }
        else if(lowInput.includes("hi") || lowInput.includes("hello")) {
            response = "Hey there! I was just taking a nap. What's on your mind?";
        }
        else {
            try {
                // සර්ච් එකකට යන්න කලින් පූසා යාළුවෙක් වගේ උත්තරයක් දෙනවා
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(input)}&format=json&no_html=1`);
                const data = await res.json();
                response = data.AbstractText || "That's interesting! Tell me more about that, I'm listening.";
            } catch(e) {
                response = "My brain is a bit fuzzy right now, can you say that again?";
            }
        }

        status.innerText = response;
        speak(response);
        document.getElementById('userInput').value = "";
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.pitch = 1.3;
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            askCat();
        };
    }
</script>
</body>
</html>
