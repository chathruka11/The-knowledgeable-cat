<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI My Cat - Smart Edition</title>
    <style>
        body { 
            background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
            font-family: sans-serif; height: 100vh; margin: 0; 
            display: flex; align-items: center; justify-content: center;
        }
        .app-card {
            background: white; width: 90%; max-width: 380px; padding: 25px;
            border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }
        .cat-box img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 5px solid #667eea; object-fit: cover;
        }
        .status-text { margin: 15px 0; font-size: 17px; font-weight: bold; color: #333; min-height: 50px; }
        input { 
            width: 85%; padding: 15px; border-radius: 20px; border: 2px solid #ddd;
            font-size: 16px; margin-bottom: 10px; outline: none;
        }
        button {
            padding: 15px; border: none; border-radius: 20px; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 10px;
        }
        .btn-ask { background: #667eea; color: white; }
        .btn-mic { background: #ff758c; color: white; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>AI My Cat 🐾</h2>
    <div class="cat-box">
        <img src="https://placekitten.com/300/300" alt="AI Cat">
    </div>

    <div id="status" class="status-text">මියා‍ව්! ඕනෑම දෙයක් අහන්න මචං...</div>

    <input type="text" id="user-input" placeholder="ප්‍රශ්නයක් ටයිප් කරන්න...">
    
    <button class="btn-ask" onclick="askCat()">පූසාට කියන්න</button>
    <button class="btn-mic" onclick="startVoice()">🎤 Voice</button>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = (SpeechRecognition) ? new SpeechRecognition() : null;
    if(recognition) recognition.lang = 'en-US'; // Voice support

    function startVoice() {
        if(!recognition) return;
        recognition.start();
        document.getElementById('status').innerText = "මම අහගෙන ඉන්නේ... 👂";
    }

    if(recognition) {
        recognition.onresult = function(event) {
            document.getElementById('user-input').value = event.results[0][0].transcript;
            askCat();
        };
    }

    async function askCat() {
        let input = document.getElementById('user-input').value.trim();
        let status = document.getElementById('status');
        if (!input) return;

        status.innerText = "ම්ම්ම්... මම ඉන්ටර්නෙට් එකේ බලනවා... 🤔";

        try {
            // Wikipedia හරහා තොරතුරු සෙවීම
            let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${input}`);
            let data = await res.json();

            if (data.extract) {
                status.innerText = data.extract;
                speak(data.extract);
            } else {
                status.innerText = "මියා‍ව්! මට ඒ ගැන තාම ලොකු විස්තරයක් නෑ මචං.";
                speak("මියා‍ව්! මට ඒ ගැන තාම ලොකු විස්තරයක් නෑ මචං.");
            }
        } catch (e) {
            status.innerText = "සර්වර් එකේ පොඩි අවුලක්!";
        }
    }

    function speak(text) {
        let msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'en-US'; 
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
