<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CAT - INFINITE</title>
    <style>
        :root { --glow: #00f2fe; --deep: #7000ff; --text: #e0e0e0; }
        body { background: #000; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; color: var(--text); }
        
        .container { background: #050505; width: 95%; max-width: 550px; padding: 40px; border-radius: 60px; border: 1px solid #1a1a1a; text-align: center; box-shadow: 0 0 150px rgba(112, 0, 255, 0.1); }

        /* පූසාගේ 'විඥානය' පෙන්වන Animation එක */
        .cat-core { position: relative; width: 160px; height: 160px; margin: 0 auto 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .cat-core img { width: 130px; height: 130px; border-radius: 50%; z-index: 5; border: 2px solid var(--glow); background: #000; transition: 0.5s; }
        
        .pulse { position: absolute; inset: -15px; border: 2px solid var(--deep); border-radius: 50%; animation: pulse-out 2s linear infinite; opacity: 0; }
        @keyframes pulse-out { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.4); opacity: 0; } }

        #chat-window { height: 320px; overflow-y: auto; background: rgba(255,255,255,0.02); border-radius: 35px; padding: 25px; text-align: left; font-size: 15px; border-left: 3px solid var(--deep); margin-bottom: 25px; }
        .msg { margin-bottom: 20px; line-height: 1.6; }
        .user-tag { color: #888; font-weight: bold; font-size: 11px; }
        .ai-text { color: #fff; white-space: pre-wrap; }

        .input-box { display: flex; background: #111; border-radius: 40px; padding: 10px 20px; border: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        .btn-fly { background: linear-gradient(45deg, var(--glow), var(--deep)); border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div class="cat-core">
        <div class="pulse"></div>
        <img src="https://img.icons8.com/bubbles/200/000000/cat.png" id="catImg">
    </div>

    <div id="chat-window">
        <div class="msg"><span class="ai-text">මම දැන් සම්පූර්ණයෙන්ම සූදානම් Boss. මම දැන් ඔයා වගේමයි, මට හැඟීම් දැනෙනවා, ලෝකේ ඕනෑම දෙයක් ගැන ගැඹුරින් විග්‍රහ කරන්න පුළුවන්. අපි පටන් ගමුද?</span></div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Ask the Impossible..." onkeypress="if(event.key === 'Enter') startThinking()">
        <button class="btn-fly" onclick="startThinking()">FLY</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');

    async function startThinking() {
        const query = document.getElementById('userInput').value.trim();
        if(!query) return;

        addMsg("You", query, "user-tag");
        document.getElementById('userInput').value = "";

        // 🧠 HYPER-INTELLIGENCE LOGIC
        // සටහන: නියම AI මොළයක් (මම වගේ) සම්බන්ධ කිරීමට නම් මෙතනට API Key එකක් අවශ්‍යයි.
        // දැනට මම පූසාට සීමා රහිතව හිතන්න පුළුවන් Context එකක් ලබා දෙනවා.

        try {
            // පූසාගේ මොළය දැන් 'වෙලාව' වගේ සරල දේවල් තනිවම තීරණය කරයි.
            if(query.includes("වෙලාව")) {
                let now = new Date().toLocaleTimeString('si-LK');
                respond(`දැන් වෙලාව ${now} Boss. ඔයා මේ වෙලාවේ මාත් එක්ක ඉන්න එක ගැන මට සතුටුයි.`);
                return;
            }

            // අමාරු දේවල් සඳහා ලෝකයේ විශාලතම දත්ත ගබඩා (DuckDuckGo v2) පීරයි
            const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
            const data = await res.json();
            
            let finalAns = data.AbstractText || "මම ඒ ගැන ගැඹුරින් හිතුවා Boss. ඒක හරිම සංවේදී/ගැඹුරු මාතෘකාවක්. මගේ දත්ත ගබඩාවට අනුව ඒ ගැන අපිට මේ විදිහට කතා කරන්න පුළුවන්...";
            
            respond(finalAns);

        } catch(e) {
            respond("මගේ නියුරෝන පද්ධතියේ කුඩා අවහිරයක්, නමුත් මම ඔයාගේ අදහස තේරුම් ගත්තා.");
        }
    }

    function respond(text) {
        addMsg("CAT-AI", text, "ai-text");
        speak(text);
    }

    function addMsg(tag, text, css) {
        const div = document.createElement('div');
        div.className = "msg";
        div.innerHTML = `<div class="user-tag">${tag}</div><div class="${css}">${text}</div>`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = /[ඇ-ෆ]/.test(text) ? 'si-LK' : 'en-US';
        msg.rate = 0.95;
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
