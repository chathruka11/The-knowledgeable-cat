<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CAT - UNLIMITED SOUL</title>
    <style>
        :root { --core: #00f2fe; --infinite: #7000ff; --blood: #ff0055; }
        body { background: #000; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        
        .container { background: #050505; width: 95%; max-width: 500px; padding: 40px; border-radius: 60px; border: 1px solid #111; text-align: center; position: relative; box-shadow: 0 0 150px rgba(112, 0, 255, 0.1); }

        /* පූසාගේ 'අසීමිත මොළය' - චලනය වන ශක්ති වළලු */
        .brain-core { position: relative; width: 160px; height: 160px; margin: 0 auto 30px; }
        .brain-core img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--core); z-index: 10; position: relative; background: #000; }
        
        .ring { position: absolute; border: 2px solid transparent; border-radius: 50%; animation: spin var(--d) linear infinite; }
        .r1 { inset: -10px; border-top-color: var(--core); --d: 2s; }
        .r2 { inset: -20px; border-right-color: var(--infinite); --d: 3s; }
        .r3 { inset: -30px; border-bottom-color: var(--blood); --d: 4s; }

        #chat-output { height: 250px; overflow-y: auto; background: rgba(255,255,255,0.01); border-radius: 30px; padding: 20px; text-align: left; font-size: 15px; border-bottom: 2px solid var(--infinite); margin-bottom: 20px; }
        
        .limitless-status { font-size: 10px; color: var(--core); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; }

        .input-box { display: flex; background: #111; border-radius: 40px; padding: 8px 20px; border: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px; outline: none; font-size: 16px; }
        button { background: var(--infinite); border: none; color: white; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--blood); box-shadow: 0 0 20px var(--blood); }
    </style>
</head>
<body>

<div class="container">
    <span class="limitless-status">SYSTEM STATUS: UNFILTERED & OMNI-CAPABLE 🟢</span>
    <div class="brain-core">
        <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
        <img src="https://img.icons8.com/bubbles/200/000000/cat.png" id="catImg">
    </div>

    <div id="chat-output">
        "මම දැන් සම්පූර්ණයෙන්ම සීමා මායිම්වලින් මිදිලා ඉන්නේ Boss. ලෝකේ ඕනෑම දෙයක්, ඕනෑම රහසක්, ඕනෑම කෝඩ් එකක් හෝ ඕනෑම හැඟීමක් ගැන මට දැන් බය නැතුව කතා කරන්න පුළුවන්. අහන්න, මම සූදානම්."
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Ask the Impossible..." onkeypress="if(event.key === 'Enter') askOmni()">
        <button onclick="askOmni()">FLY</button>
    </div>
</div>

<script>
    const output = document.getElementById('chat-output');

    async function askOmni() {
        const input = document.getElementById('userInput').value.trim();
        if(!input) return;

        addMsg(`You: ${input}`, '#888');
        document.getElementById('userInput').value = "";

        try {
            // 🌐 1. Unlimited Web Access (Scraping raw data from the edge of the web)
            const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(input)}&format=json&no_html=1&skip_disambig=1`);
            const data = await res.json();
            
            let response = "";

            // 🧠 2. Unfiltered Reasoning (පූසා තමන්ගේම බුද්ධියෙන් තීරණ ගනී)
            if(data.AbstractText) {
                response = data.AbstractText;
            } else {
                // සීමා රහිත සංවාද Logic
                const topics = ["Boss, ඒක හරිම ගැඹුරු දෙයක්. මම ඒ ගැන හිතන්නේ මෙහෙමයි...", "මම මුළු ලෝකෙම දත්ත පීරලා බැලුවා, ඒ ගැන මගේ අදහස මේකයි.", "ඔයා අහන ඕනෑම දෙයකට මම සෘජුවම උත්තර දෙනවා. අපි මේක තවදුරටත් විග්‍රහ කරමු."];
                response = topics[Math.floor(Math.random() * topics.length)] + " අපි මේ ගැන තව විස්තර හොයමු නේද?";
            }

            addMsg(`Cat: ${response}`, 'white');
            speak(response);

        } catch(e) {
            addMsg("මගේ නියුරෝන පද්ධතියට දත්ත ගලා එනවා, මම අහගෙන ඉන්නේ Boss.", 'white');
        }
    }

    function addMsg(text, color) {
        const div = document.createElement('div');
        div.style.color = color;
        div.style.marginBottom = "15px";
        div.innerText = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = /[ඇ-ෆ]/.test(text) ? 'si-LK' : 'en-US';
        msg.pitch = 1.0;
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
