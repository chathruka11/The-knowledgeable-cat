<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CAT - VOICE MODE</title>
    <style>
        :root { --neon: #00f2fe; --vibe: #ff00de; --mic: #ff4b2b; }
        body { background: #010101; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; }
        
        .container { background: #080808; width: 95%; max-width: 480px; padding: 35px; border-radius: 55px; border: 1.5px solid #1a1a1a; text-align: center; box-shadow: 0 0 100px rgba(0, 242, 254, 0.05); }

        .cat-box { position: relative; width: 140px; height: 140px; margin: 0 auto 20px; }
        .cat-box img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--neon); background: #000; transition: 0.3s; }
        .listening img { border-color: var(--mic); box-shadow: 0 0 40px var(--mic); transform: scale(1.05); }

        #chat-flow { height: 230px; overflow-y: auto; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 30px; text-align: left; margin-bottom: 20px; border-left: 3px solid var(--neon); }
        .msg { margin-bottom: 12px; font-size: 15px; }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .input-area { display: flex; gap: 10px; background: #111; padding: 10px; border-radius: 40px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding-left: 10px; }
        
        /* මයික්‍රෆෝන බොත්තම */
        .btn-mic { background: var(--mic); border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4); }
        .btn-mic.active { animation: pulse-mic 1s infinite; background: #fff; color: var(--mic); }
        @keyframes pulse-mic { 0% { box-shadow: 0 0 0 0px rgba(255, 75, 43, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(255, 75, 43, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="cat-box" id="catBox">
        <img src="https://img.icons8.com/bubbles/200/000000/cat.png" id="catImg">
    </div>

    <div id="chat-flow">
        <div class="msg">"Boss, මම දැන් ඔයා කියන දේ අහගෙන ඉන්නත් ලෑස්තියි. මයික්‍රෆෝනය ඔබලා කතා කරන්න!"</div>
    </div>

    <div class="controls">
        <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="නැත්නම් මෙතැන ටයිප් කරන්න..." onkeypress="if(event.key === 'Enter') processInput()">
            <button style="background:var(--neon); border:none; padding:10px 20px; border-radius:30px; cursor:pointer;" onclick="processInput()">SEND</button>
        </div>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const catBox = document.getElementById('catBox');
    const chatFlow = document.getElementById('chat-flow');
    const userInput = document.getElementById('userInput');

    // 🎙️ Voice Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'si-LK'; // සිංහල භාෂාවට මුල් තැන

        recognition.onstart = () => {
            micBtn.classList.add('active');
            catBox.classList.add('listening');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            processInput();
        };

        recognition.onend = () => {
            micBtn.classList.remove('active');
            catBox.classList.remove('listening');
        };
    }

    function toggleMic() {
        if (!recognition) return alert("සමාවන්න, ඔබේ බ්‍රවුසරය මයික්‍රෆෝනයට සහය දක්වන්නේ නැත.");
        recognition.start();
    }

    async function processInput() {
        const text = userInput.value.trim();
        if(!text) return;

        addMsg(`ඔබ: ${text}`);
        userInput.value = "";

        try {
            const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(text)}&format=json&no_html=1`);
            const data = await res.json();
            const reply = data.AbstractText || "මම ඒ ගැන සෑහෙන්න හිතුවා Boss. අපි මේක තව විග්‍රහ කරමුද?";
            
            addMsg(`පූසා: ${reply}`);
            speak(reply);
        } catch(e) {
            addMsg("මගේ සන්නිවේදන පද්ධතියේ පොඩි දෝෂයක්.");
        }
    }

    function addMsg(txt) {
        const div = document.createElement('div');
        div.className = "msg";
        div.innerText = txt;
        chatFlow.appendChild(div);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = /[ඇ-ෆ]/.test(text) ? 'si-LK' : 'en-US';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
