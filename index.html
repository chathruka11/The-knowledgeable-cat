<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI My Cat - Pro Edition</title>
    <style>
        body { 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        .app-card {
            background: white; width: 90%; max-width: 380px; padding: 25px;
            border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center;
        }
        .cat-box img {
            width: 150px; height: 150px; border-radius: 50%; border: 5px solid #ff758c; object-fit: cover;
        }
        .status-text { margin: 15px 0; font-size: 17px; font-weight: bold; color: #333; min-height: 60px; overflow-y: auto; max-height: 150px; }
        input { 
            width: 85%; padding: 15px; border-radius: 20px; border: 2px solid #ddd; font-size: 16px; margin-bottom: 10px; outline: none;
        }
        button {
            padding: 15px; border: none; border-radius: 20px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 10px;
        }
        .btn-ask { background: #667eea; color: white; }
        .btn-mic { background: #ff758c; color: white; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>AI My Cat 🐾</h2>
    <div class="cat-box">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eHRndmt3Z3o1eHByazR6eXFid3R5eHh5eHh5eHh5eHh5eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbM3vUzUtHyBnL/giphy.gif" alt="Animated Cat">
    </div>

    <div id="status" class="status-text">මියා‍ව්! මම දැන් ලෑස්තියි... ඕනෑම දෙයක් අහන්න මචං!</div>

    <input type="text" id="user-input" placeholder="Ask anything in English...">
    
    <button class="btn-ask" onclick="askCat()">පූසාට කියන්න</button>
    <button class="btn-mic" onclick="startVoice()">🎤 Voice</button>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = (SpeechRecognition) ? new SpeechRecognition() : null;
    if(recognition) recognition.lang = 'en-US';

    function startVoice() {
        if(!recognition) return;
        recognition.start();
        document.getElementById('status').innerText = "මම අහගෙන ඉන්නේ... 👂";
    }

    if(recognition) {
        recognition.onresult = function(event) {
            document.getElementById('user-input').value = event.results[0][0].transcript;
            askCat();
        };
    }

    async function askCat() {
        let input = document.getElementById('user-input').value.trim();
        let status = document.getElementById('status');
        if (!input) return;

        // YouTube Logic - මම මේකත් ඇඩ් කළා
        if(input.includes("youtube.com") || input.includes("youtu.be")) {
            status.innerText = "මම මේ වීඩියෝ එක ගැන බලනවා...";
            let videoId = input.split('v=')[1] || input.split('/').pop();
            status.innerHTML = `<img src="https://img.youtube.com/vi/${videoId}/0.jpg" style="width:100%; border-radius:10px;"><br>මෙන්න වීඩියෝ එකේ පින්තූරේ!`;
            speak("Here is the YouTube video thumbnail, boss!");
            return;
        }

        status.innerText = "ම්ම්ම්... මම හිතනවා... 🤔";

        try {
            // Wikipedia සෙවීම
            let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${input}`);
            let data = await res.json();

            let finalResponse = "";

            if (data.extract) {
                finalResponse = data.extract;
            } else {
                // Friendly Chat Logic
                let lowerInput = input.toLowerCase();
                if(lowerInput.includes("hi") || lowerInput.includes("hello")) {
                    finalResponse = "Hello there! I'm your AI cat. I'm so happy to talk to you!";
                } else if(lowerInput.includes("how are you")) {
                    finalResponse = "I'm purr-fectly fine! Just waiting for your next question.";
                } else if(lowerInput.includes("your name") || lowerInput.includes("who are you")) {
                    finalResponse = "I am the Boss Chathruka's Special AI Cat! Nice to meet you.";
                } else if(lowerInput.includes("joke")) {
                    finalResponse = "Why don't cats play poker in the jungle? Too many cheetahs!";
                } else {
                    finalResponse = "I am not 100% sure about " + input + ", but I am learning every day!";
                }
            }

            status.innerText = finalResponse;
            speak(finalResponse);

        } catch (e) {
            status.innerText = "සර්වර් එකේ පොඩි අවුලක් මචං!";
        }
    }

    // පූසාගේ අලුත් හඬ (Cute Voice)
    function speak(text) {
        window.speechSynthesis.cancel(); 
        let msg = new SpeechSynthesisUtterance();
        msg.text = text;
        
        let voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
            // විවිධ බ්‍රවුසර් වල හොඳම හඬ තෝරාගැනීම
            msg.voice = voices.find(v => v.lang.includes('en')) || voices[0];
        }

        msg.pitch = 1.4; //  හීනි කරලා හුරතල් ගතිය වැඩි කළා
        msg.rate = 1.0;  // කතා කරන වේගය
        msg.lang = 'en-US'; 

        window.speechSynthesis.speak(msg);
    }

    // හඬවල් load වෙන්න වෙලාවක් යන නිසා මේක අවශ්‍යයි
    window.speechSynthesis.onvoiceschanged = function() {
        window.speechSynthesis.getVoices();
    };
</script>

</body>
</html>
