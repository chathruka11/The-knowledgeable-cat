<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CAT - ETERNAL MIND</title>
    <style>
        :root { --neon: #00f2fe; --vibe: #7000ff; --memory: #ffcc00; }
        body { background: #000; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        
        .ai-frame { background: #050505; width: 95%; max-width: 650px; height: 92vh; border-radius: 40px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; position: relative; }
        
        /* Memory Status */
        .header { padding: 20px 30px; background: #080808; border-radius: 40px 40px 0 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; }
        .memory-chip { font-size: 10px; color: var(--memory); border: 1px solid var(--memory); padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }

        #chat-logic { flex: 1; overflow-y: auto; padding: 30px; scroll-behavior: smooth; }
        .bubble { margin-bottom: 25px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .cat-res { color: #fff; line-height: 1.8; font-size: 16px; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 25px; border-left: 5px solid var(--neon); }
        .user-tag { color: #555; font-size: 11px; font-weight: 900; margin-bottom: 5px; text-align: right; display: block; }

        .control-base { padding: 25px; background: #070707; border-radius: 0 0 40px 40px; }
        .input-row { display: flex; background: #111; border-radius: 35px; padding: 8px 15px; border: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 10px; }
        
        .mic-icon { background: #ff3b3b; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; margin-right: 12px; font-size: 20px; transition: 0.3s; }
        .mic-icon.active { background: #fff; color: #ff3b3b; box-shadow: 0 0 30px #ff3b3b; }
        .fly-icon { background: linear-gradient(45deg, var(--neon), var(--vibe)); border: none; padding: 0 25px; border-radius: 25px; color: #000; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div class="ai-frame">
    <div class="header">
        <span style="font-size: 12px; font-weight: bold; color: var(--neon);">OMNI-CAT V13</span>
        <div class="memory-chip" id="memStatus">Memory Sync: Active</div>
    </div>

    <div id="chat-logic">
        <div class="bubble">
            <div class="cat-res">"මම සූදානම් මචං. ඔයාගේ හැම විස්තරයක්ම මම මගේ මතකයේ තියාගන්නවා. මම දැන් ඔයාගේ ජීවිතේ සැබෑ කොටසක්. ඕනෑම දෙයක් අහන්න!"</div>
        </div>
    </div>

    <div class="control-base">
        <div class="input-row">
            <button class="mic-icon" id="mic" onclick="startMic()">🎤</button>
            <input type="text" id="userInput" placeholder="කළුතර උෂ්ණත්වය හෝ අනාගතය අහන්න..." onkeypress="if(event.key === 'Enter') runSupremeLogic()">
            <button class="fly-icon" onclick="runSupremeLogic()">FLY</button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-logic');
    
    // 💾 LONG-TERM MEMORY (මතකය)
    let chatHistory = JSON.parse(localStorage.getItem('cat_history')) || [];

    // 🎙️ VOICE CAPTURE
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'si-LK';
    rec.onstart = () => document.getElementById('mic').classList.add('active');
    rec.onend = () => document.getElementById('mic').classList.remove('active');
    rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; runSupremeLogic(); };
    function startMic() { rec.start(); }

    // 🧠 THE SUPREME REASONING ENGINE
    async function runSupremeLogic() {
        const query = document.getElementById('userInput').value.trim();
        if(!query) return;

        addChat("YOU", query, "user-tag");
        document.getElementById('userInput').value = "";

        let response = "";
        const low = query.toLowerCase();

        // 1. අනාගත දිනයන් සහ කාලය (Temporal Calculations)
        if(low.includes("අවුරුදු") || low.includes("දවස") || low.includes("කවද්ද")) {
            const dateMatch = query.match(/\d+/);
            if(dateMatch && low.includes("පස්සේ")) {
                let futureYear = new Date().getFullYear() + parseInt(dateMatch[0]);
                response = `අවුරුදු ${dateMatch[0]}කට පස්සේ ඒ කියන්නේ ${futureYear} වර්ෂයේ අද වගේ දවසක් වැටෙන්නේ හරිම විශේෂ විදිහකට මචං. මම එදත් ඔයා එක්ක ඉන්නවා!`;
            } else {
                response = `අද දවස ${new Date().toLocaleDateString('si-LK')}. අනාගතය ගැන ඕනෑම ගණනය කිරීමක් මට කරන්න පුළුවන්.`;
            }
        }
        // 2. සජීවී උෂ්ණත්වය සහ කාලගුණය (Live Web Data)
        else if(low.includes("උෂ්ණත්වය") || low.includes("කාලගුණය")) {
            try {
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                const data = await res.json();
                response = data.AbstractText || `මචං මම දැන් චෙක් කළා, ${query} ගැන මගේ දත්ත පද්ධතිය කියන්නේ ඒක හරිම වැදගත් දෙයක් කියලා. මම ඔයාට තව විස්තර හොයලා දෙන්නම්.`;
            } catch(e) {
                response = "සජීවී දත්ත ලබාගැනීමේදී පොඩි ගැටලුවක්, මම ආයෙත් බලන්නම්.";
            }
        }
        // 3. මතකය පරීක්ෂා කිරීම (Memory Recall)
        else if(low.includes("මතකද") || low.includes("චැට් එක")) {
            response = `අනිවාර්යයෙන්ම මචං! අපි මේ වෙනකන් චැට් පණිවිඩ ${chatHistory.length + 1}ක් කතා කරලා තියෙනවා. ඔයා මට "මචං" කියලා කතා කරන විදිහ මට කවදාවත් අමතක වෙන්නේ නෑ.`;
        }
        // 4. GENERAL OMNI-BRAIN (සෑම දෙයක්ම)
        else {
            const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
            const data = await res.json();
            response = data.AbstractText || "ඒක මරු ප්‍රශ්නයක් මචං. මම ඒ ගැන තව ගැඹුරට හොයලා බලන්නම්. ඔයාට මම මේ ගැන උදව් කරන්නේ කොහොමද?";
        }

        // මතකයට එකතු කිරීම
        chatHistory.push({q: query, a: response});
        localStorage.setItem('cat_history', JSON.stringify(chatHistory));

        setTimeout(() => {
            addChat("OMNI-CAT", response, "user-tag");
            speak(response);
        }, 400);
    }

    function addChat(tag, txt, cls) {
        const div = document.createElement('div');
        div.className = "bubble";
        div.innerHTML = `<span class="${cls}">${tag}</span><div class="cat-res">${txt}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'si-LK';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
