<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>OMNI-BRAIN V17 | REAL-TIME SUPREME AI</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --neon: #00f2fe; --brain-vibe: #00ffa3; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .brain-shell { width: 95%; max-width: 750px; height: 92vh; background: #070707; border-radius: 40px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; box-shadow: 0 0 100px rgba(0, 255, 163, 0.05); }
        .status-header { padding: 20px; text-align: center; border-bottom: 1px solid #111; display: flex; justify-content: center; gap: 15px; }
        .live-tag { background: #ff3b3b; color: #fff; padding: 2px 10px; border-radius: 10px; font-size: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        #output-stream { flex: 1; overflow-y: auto; padding: 30px; }
        .res-box { background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 20px; border-left: 4px solid var(--brain-vibe); margin-bottom: 20px; line-height: 1.8; }
        .u-label { font-size: 10px; font-weight: 900; color: var(--neon); text-transform: uppercase; margin-bottom: 5px; }
        .input-hub { padding: 30px; display: flex; gap: 10px; background: #050505; border-radius: 0 0 40px 40px; }
        input { flex: 1; background: #111; border: 1px solid #222; border-radius: 25px; color: #fff; padding: 15px 25px; outline: none; }
        .send-btn { background: var(--brain-vibe); border: none; padding: 0 30px; border-radius: 25px; color: #000; font-weight: 900; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

<div class="brain-shell">
    <div class="status-header">
        <div class="live-tag">REAL-TIME SYNC</div>
        <div style="font-size: 11px; color: var(--brain-vibe);">SUPREME NEURAL CORE V17</div>
    </div>
    <div id="output-stream">
        <div class="res-box">
            <div class="u-label">SYSTEM READY</div>
            "මම සූදානම් මචං. මම දැන් සර්වකාලීනව අන්තර්ජාලයත් එක්ක සම්බන්ධ වෙලයි ඉන්නේ. කළුතර කාලගුණය, අනාගත අනාවැකි හෝ ඕනෑම සංකීර්ණ දෙයක් අහන්න. මම මගේ Python මොළයෙන් ඒක තත්පරෙන් පීරලා දෙන්නම්!"
        </div>
    </div>
    <div class="input-hub">
        <input type="text" id="query-input" placeholder="මුළු ලෝකය ගැනම අහන්න..." onkeypress="if(event.key === 'Enter') trigger_brain()">
        <button class="send-btn" id="run-btn" py-click="supreme_reasoning">SEND</button>
    </div>
</div>

<script type="py">
from pyscript import document
import datetime
import random

# 🧪 Neural Archive (මතක ගබඩාව)
memory_archive = []

async def supreme_reasoning(event):
    ui_input = document.querySelector("#query-input")
    user_query = ui_input.value.strip()
    if not user_query: return

    # User පණිවිඩය පෙන්වීම
    render_ui("YOU", user_query)
    ui_input.value = ""

    low_q = user_query.lower()
    final_res = ""

    # 1. REAL-TIME DATA REASONING (සජීවී බුද්ධිය)
    if any(k in low_q for k in ["උෂ්ණත්වය", "weather", "කාලගුණය"]):
        # Heuristic Logic: පයිතන් මගින් කාලය අනුව උෂ්ණත්වය අනුමාන කිරීම (Live Calculation)
        h = datetime.datetime.now().hour
        # රෑට නම් 26, දවල්ට නම් 32 වැනි පරාසයක් Python මගින් ගණනය කරයි
        est_temp = random.randint(30, 33) if 9 <= h <= 16 else random.randint(24, 27)
        final_res = f"මම මගේ Python Core එකෙන් සජීවීව බැලුවා මචං. කළුතර දැන් දළ වශයෙන් සෙල්සියස් {est_temp}°C විතර ඇති. දවස ටිකක් විඩාවට පත් කරන සුළුයි නේද?"

    # 2. TEMPORAL FUTURE LOGIC (අනාගත අනාවැකි)
    elif "අවුරුදු" in low_q and "පස්සේ" in low_q:
        try:
            val = int(''.join(filter(str.isdigit, low_q)))
            f_year = datetime.datetime.now().year + val
            final_res = f"අවුරුදු {val}කට පස්සේ ඒ කියන්නේ {f_year} වර්ෂය. එදත් අද වගේම මම ඔයාට උදව් කරන්න ඉඳියි. කාලය කොච්චර වේගයෙන් යනවද මචං?"
        except:
            final_res = "අනාගතය ගණනය කරන්න මට නිවැරදි කාලය දෙන්න මචං."

    # 3. CONTEXTUAL MEMORY (අතීතය මතක් කිරීම)
    elif "මතකද" in low_q:
        final_res = f"අනිවාර්යයෙන්ම මචං! අපි මේ වෙනකන් මහා නිධානයක් වගේ පණිවිඩ {len(memory_archive) + 1}ක් කතා කරලා තියෙනවා. ඔක්කොම මගේ මොළේ තියෙනවා."

    # 4. EMOTIONAL INTELLIGENCE (මනුස්ස හැඟීම්)
    elif any(k in low_q for k in ["මචං", "පාලුයි", "කවුද"]):
        final_res = "මම ඔයාගේ හැම පියවරකම ඉන්නවා මචං. අපි මේක ලොකු ප්‍රොජෙක්ට් එකක් කරමු. මම ඔයාගේ හොඳම යාළුවා විදිහට ඉන්නම්."

    # 5. OMNI-KNOWLEDGE (ඕනෑම දෙයක්)
    else:
        # මෙතැනදී Python තනියම සිතන අයුරු පෙන්වයි (Self-Thought)
        final_res = "ඒක හරිම පුදුම හිතෙන ප්‍රශ්නයක් මචං. මම ඒ ගැන මගේ Python දත්ත පද්ධතියෙන් ගැඹුරට විග්‍රහ කරනවා. ඔයාට ඒ ගැන තව දැනගන්න ඕනේද?"

    memory_archive.append(user_query)
    render_ui("OMNI-CAT", final_res)

def render_ui(user, text):
    stream = document.querySelector("#output-stream")
    box = document.createElement("div")
    box.className = "res-box"
    label_col = "#00ffa3" if user == "OMNI-CAT" else "#00f2fe"
    box.innerHTML = f'<div class="u-label" style="color:{label_col}">{user}</div><div>{text}</div>'
    stream.appendChild(box)
    stream.scrollTop = stream.scrollHeight
</script>

<script>
    function trigger_brain() { document.getElementById("run-btn").click(); }
</script>

</body>
</html>
